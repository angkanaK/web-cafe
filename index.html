<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
       
</head>
<body>
    <header class="main-header">
        <div class="logo-area">
            <h1>Booklynz cafe</h1>
        </div>
        <nav class="nav-menu">
            <ul>
                <li><a href="#">HOME</a></li>
                <li><a href="#">ORDER</a></li>
            </ul>
        </nav>
            <div class="nav-login">
                    <a href="#">LOGIN</a> 
            </div>
    </header>
    <main class="container">
        <section class="menu-area">
        <h2>Our Menu</h2>
        <div class="grid">
            <div class="card">
                <img src="image/latte.jpg" alt="latte-img" class="menu-img">
                <h3>Latte</h3>
                <p>Price: 50</p>
                <button>Add to Cart</button>
            </div>
            <div class="card">
                <img src="image/hamburger.jpg" alt="hamburger-img" class="menu-img">
                <h3>Hamburger</h3>
                <p>Price: 60</p>
                <button>Add to Cart</button>
            </div>
            <div class="card">
                <img src="image/pizza.jpg" alt="pizza-img" class="menu-img">
                <h3>Pizza</h3>
                <p>Price: 129</p>
                <button>Add to Cart</button>
            </div>
         </div>   
    </section> 
    <aside class="cart-area">
        <h2>Your Order</h2>
        <ul class="cart-list">
            <li>No items yet</li>
        </ul>
        <div class="summary">
            <p>Total: 0</p>
            <button id="checkout-btn">Check Out</button>
        </div>
    </aside>       
    </main>
    <script src="script.js"></script>
</body>
</html>
